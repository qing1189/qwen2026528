<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen-2API 管理面板</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --border: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8892a0;
  --green: #00e676;
  --yellow: #ffd600;
  --red: #ff1744;
  --accent: #7c4dff;
  --accent2: #b388ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 20px;
}
header h1 {
  font-size: 1.3em;
  color: var(--accent2);
}
header .meta {
  font-size: 0.85em;
  color: var(--text-dim);
}
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.controls select, .controls button {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 0.85em;
  cursor: pointer;
}
.controls button:hover { border-color: var(--accent); }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.card h2 {
  font-size: 1.05em;
  margin-bottom: 12px;
  color: var(--accent2);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}
.stat-item {
  background: var(--bg);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}
.stat-item .label {
  font-size: 0.75em;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.stat-item .value {
  font-size: 1.4em;
  font-weight: 700;
}
.status-ok { color: var(--green); }
.status-warn { color: var(--yellow); }
.status-err { color: var(--red); }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88em;
}
th, td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
td { font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.85em; }
.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.dot-green { background: var(--green); }
.dot-yellow { background: var(--yellow); }
.dot-red { background: var(--red); }

.bar-wrap {
  background: var(--bg);
  border-radius: 4px;
  height: 22px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s, background 0.4s;
}
.bar-label {
  position: absolute;
  top: 0; left: 10px; right: 10px;
  line-height: 22px;
  font-size: 0.78em;
  color: var(--text);
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

.model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.model-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 0.88em;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color 0.2s;
}
.model-chip:hover { border-color: var(--accent); }
.model-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.cap-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}
.cap-tag {
  font-size: 0.72em;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(124,77,255,0.15);
  color: var(--accent2);
}

footer {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.78em;
  padding: 12px;
}

.loading { color: var(--text-dim); font-style: italic; }

.forms-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 640px) {
  .forms-row { grid-template-columns: 1fr; }
}
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 0.82em;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.form-group input {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 0.9em;
}
.form-group input:focus { outline: none; border-color: var(--accent); }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 7px 18px;
  font-size: 0.9em;
  cursor: pointer;
}
.btn:hover { opacity: 0.85; }
.msg {
  font-size: 0.82em;
  margin-top: 6px;
  min-height: 1.4em;
}
.msg-ok { color: var(--green); }
.msg-err { color: var(--red); }

.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.auth-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 340px;
}
.auth-box h3 { margin-bottom: 12px; color: var(--accent2); }
.auth-box .form-group { margin-bottom: 14px; }
.auth-box .msg { margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>Qwen-2API 管理面板</h1>
      <div class="meta">OpenAI 兼容代理 · chat.qwen.ai</div>
    </div>
    <div class="controls">
      <select id="interval" title="自动刷新间隔">
        <option value="5000">5秒</option>
        <option value="10000" selected>10秒</option>
        <option value="30000">30秒</option>
        <option value="0">关闭</option>
      </select>
      <button id="refreshBtn">刷新</button>
    </div>
  </header>

  <!-- 总览 -->
  <div class="card">
    <h2>总览</h2>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="label">状态</div>
        <div class="value" id="status">-</div>
      </div>
      <div class="stat-item">
        <div class="label">总容量</div>
        <div class="value" id="capacity">-</div>
      </div>
      <div class="stat-item">
        <div class="label">账号数</div>
        <div class="value" id="accountCount">-</div>
      </div>
      <div class="stat-item">
        <div class="label">队列</div>
        <div class="value" id="queueCount">-</div>
      </div>
    </div>
  </div>

  <!-- 请求队列 -->
  <div class="card">
    <h2>请求队列</h2>
    <div class="bar-wrap">
      <div class="bar-fill" id="queueBar" style="width:0%;background:var(--green)"></div>
      <div class="bar-label" id="queueLabel">0 / 100</div>
    </div>
  </div>

  <!-- 令牌池 -->
  <div class="card">
    <h2>令牌池</h2>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th>账号</th><th>令牌</th><th>过期</th><th>错误数</th><th>活跃/最大</th><th>健康</th></tr>
        </thead>
        <tbody id="poolBody">
          <tr><td colspan="6" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 模型 -->
  <div class="card">
    <h2 style="cursor:pointer" onclick="toggleModels()">可用模型 <span id="modelToggle" style="font-size:0.7em;color:var(--text-dim)">&#x25bc;</span></h2>
    <div id="modelGrid" style="display:none">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- 令牌管理 -->
  <div class="card">
    <h2>令牌管理</h2>
    <div class="forms-row">
      <div>
        <h3 style="font-size:0.92em;margin-bottom:8px">添加令牌</h3>
        <form id="addTokenForm">
          <div class="form-group">
            <label>令牌字符串（JWT）</label>
            <input type="text" id="addTokenInput" placeholder="粘贴 Qwen JWT 令牌..." required>
          </div>
          <button type="submit" class="btn">添加</button>
          <div class="msg" id="addTokenMsg"></div>
        </form>
      </div>
      <div>
        <h3 style="font-size:0.92em;margin-bottom:8px">登录添加</h3>
        <form id="loginForm">
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="loginEmail" placeholder="Qwen 账号邮箱" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="Qwen 账号密码" required>
          </div>
          <button type="submit" class="btn">登录</button>
          <div class="msg" id="loginMsg"></div>
        </form>
      </div>
    </div>
  </div>

  <footer>上次刷新: <span id="lastRefresh">-</span></footer>
</div>

<!-- Auth overlay -->
<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-box">
    <h3>需要 API Key</h3>
    <p style="font-size:0.85em;color:var(--text-dim);margin-bottom:12px">此服务器已配置 API_KEY 验证，请输入密钥。</p>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="authKeyInput" placeholder="输入 API Key...">
    </div>
    <button class="btn" id="authSubmitBtn">确认</button>
    <div class="msg" id="authMsg"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let refreshTimer = null;
const API_BASE = location.origin;

function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const diff = d - now;
  if (diff < 0) return '<span style="color:var(--red)">已过期</span>';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h > 24) return Math.floor(h/24) + '天' + h%24 + '时';
  return h + '时' + m + '分';
}

function healthDot(errorCount, hasToken) {
  if (errorCount >= 3 || !hasToken) return '<span class="dot dot-red"></span>不可用';
  if (errorCount >= 1) return '<span class="dot dot-yellow"></span>异常';
  return '<span class="dot dot-green"></span>正常';
}

function renderStatus(data) {
  $('status').innerHTML = '<span class="status-ok">正常</span>';
  $('capacity').textContent = data.totalCapacity;
  $('accountCount').textContent = data.pool.length;
  $('queueCount').textContent = data.queue.queued;

  // Queue bar
  const q = data.queue.queued;
  const qMax = data.queue.maxQueueSize;
  const pct = Math.min(100, (q / qMax) * 100);
  const qBar = $('queueBar');
  qBar.style.width = pct + '%';
  qBar.style.background = pct > 80 ? 'var(--red)' : pct > 50 ? 'var(--yellow)' : 'var(--green)';
  $('queueLabel').textContent = q + ' / ' + qMax;

  // Token pool
  const poolBody = $('poolBody');
  if (data.pool.length === 0) {
    poolBody.innerHTML = '<tr><td colspan="6" style="color:var(--text-dim)">无账号</td></tr>';
  } else {
    poolBody.innerHTML = data.pool.map(t => {
      const email = t.email || '—';
      const emailDisplay = email.length > 20 ? email.slice(0, 20) + '...' : email;
      return `<tr>
        <td>${emailDisplay}</td>
        <td>${t.hasToken ? '<span style="color:var(--green)">&#x2713;</span> 有效' : '<span style="color:var(--red)">&#x2717;</span> 无'}</td>
        <td>${formatTime(t.expiresAt)}</td>
        <td>${t.errorCount}</td>
        <td>${t.activeRequests} / ${t.maxConcurrent}</td>
        <td>${healthDot(t.errorCount, t.hasToken)}</td>
      </tr>`;
    }).join('');
  }

  $('lastRefresh').textContent = new Date().toLocaleTimeString();
}

function renderModels(data) {
  const grid = $('modelGrid');
  const models = data.data || [];
  if (models.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-dim)">无可用模型</div>';
    return;
  }

  // Group by family (prefix before first dash or dot)
  const families = {};
  for (const m of models) {
    const id = m.id;
    const family = id.replace(/[-.](?:thinking|search|vision|vl|plus|pro|max|lite|mini|turbo|instruct|chat|coder|math|research|creative|audio|tts|vl-plus|vl-max).*/i, '') || id;
    if (!families[family]) families[family] = [];
    families[family].push(m);
  }

  let html = '';
  for (const [family, members] of Object.entries(families)) {
    html += `<details style="margin-bottom:6px"><summary style="cursor:pointer;color:var(--accent2);font-size:0.88em;padding:4px 0;user-select:none">${family} <span style="color:var(--text-dim);font-size:0.78em">(${members.length})</span></summary>`;
    html += '<div class="model-grid" style="margin-top:6px">';
    for (const m of members) {
      const caps = m.capabilities || {};
      const capTags = [];
      if (caps.thinking) capTags.push('思考');
      if (caps.search) capTags.push('搜索');
      if (caps.vision) capTags.push('视觉');
      if (caps.deep_research) capTags.push('研究');
      if (caps.image_gen) capTags.push('图片');
      if (caps.video_gen) capTags.push('视频');
      if (caps.web_dev) capTags.push('建站');
      if (caps.slides) capTags.push('PPT');

      html += `<div class="model-chip">
        <div class="model-dot"></div>
        <div>
          <div>${m.id}</div>
          ${capTags.length ? `<div class="cap-tags">${capTags.map(c => `<span class="cap-tag">${c}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div></details>';
  }
  grid.innerHTML = html;
}

let modelsVisible = false;
function toggleModels() {
  modelsVisible = !modelsVisible;
  $('modelGrid').style.display = modelsVisible ? '' : 'none';
  $('modelToggle').innerHTML = modelsVisible ? '&#x25b2;' : '&#x25bc;';
}

function getApiKey() {
  return sessionStorage.getItem('adminApiKey') || '';
}

function authHeaders() {
  const key = getApiKey();
  return key ? { 'Authorization': 'Bearer ' + key } : {};
}

async function apiFetch(url, options = {}) {
  const headers = { ...authHeaders(), ...(options.headers || {}) };
  const res = await fetch(url, { ...options, headers });
  if (res.status === 401) {
    sessionStorage.removeItem('adminApiKey');
    $('authOverlay').style.display = 'flex';
    throw new Error('unauthorized');
  }
  return res;
}

async function fetchStats() {
  try {
    const res = await apiFetch(`${API_BASE}/admin/api/stats`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderStatus(data);

    const mRes = await apiFetch(`${API_BASE}/v1/models`).catch(() => null);
    if (mRes && mRes.ok) {
      const mData = await mRes.json();
      renderModels(mData);
    }
  } catch (e) {
    if (e.message !== 'unauthorized') console.error('fetchStats error:', e);
  }
}

function setupRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  const ms = parseInt($('interval').value);
  if (ms > 0) refreshTimer = setInterval(fetchStats, ms);
}

$('interval').addEventListener('change', setupRefresh);
$('refreshBtn').addEventListener('click', fetchStats);

// Auth overlay
$('authSubmitBtn').addEventListener('click', () => {
  const key = $('authKeyInput').value.trim();
  if (!key) {
    $('authMsg').className = 'msg msg-err';
    $('authMsg').textContent = '请输入 API Key';
    return;
  }
  sessionStorage.setItem('adminApiKey', key);
  $('authOverlay').style.display = 'none';
  $('authMsg').textContent = '';
  fetchStats();
});

$('authKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('authSubmitBtn').click();
});

// Token management forms
$('addTokenForm').addEventListener('submit', async e => {
  e.preventDefault();
  const token = $('addTokenInput').value.trim();
  const msgEl = $('addTokenMsg');
  msgEl.textContent = '添加中...';
  msgEl.className = 'msg';
  try {
    const res = await apiFetch(`${API_BASE}/admin/api/token/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();
    if (data.success) {
      msgEl.className = 'msg msg-ok';
      msgEl.textContent = '添加成功！';
      $('addTokenInput').value = '';
      fetchStats();
    } else {
      msgEl.className = 'msg msg-err';
      msgEl.textContent = data.error?.message || '添加失败';
    }
  } catch (err) {
    msgEl.className = 'msg msg-err';
    msgEl.textContent = err.message === 'unauthorized' ? '认证失败' : '请求失败';
  }
});

$('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = $('loginEmail').value.trim();
  const password = $('loginPassword').value;
  const msgEl = $('loginMsg');
  msgEl.textContent = '登录中...';
  msgEl.className = 'msg';
  try {
    const res = await apiFetch(`${API_BASE}/admin/api/token/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (data.success) {
      msgEl.className = 'msg msg-ok';
      msgEl.textContent = '登录成功！';
      $('loginEmail').value = '';
      $('loginPassword').value = '';
      fetchStats();
    } else {
      msgEl.className = 'msg msg-err';
      msgEl.textContent = data.error?.message || '登录失败';
    }
  } catch (err) {
    msgEl.className = 'msg msg-err';
    msgEl.textContent = err.message === 'unauthorized' ? '认证失败' : '请求失败';
  }
});

fetchStats();
setupRefresh();
</script>
</body>
</html>
